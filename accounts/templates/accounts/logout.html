{% extends "base.html" %}

{% block title %}Logout - OTCloud{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
  <div style="width: 100%; max-width: 380px; text-align: center;">
    <h1 style="font-size: 1.375rem; font-weight: 600; margin-bottom: 0.5rem;">Log Out</h1>
    <p style="color: var(--text-muted, #94a3b8); font-size: 0.875rem; margin-bottom: 1.5rem;">Are you sure you want to log out?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger" style="width: 100%; padding: 0.75rem; font-size: 0.9375rem;">Log Out</button>
    </form>

    <div style="margin-top: 1rem;">
      <a href="/" style="font-size: 0.8125rem; color: var(--text-muted, #94a3b8); text-decoration: none;">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
