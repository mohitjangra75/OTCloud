{% extends "base.html" %}

{% block extra_css %}
<style>
    /* Remove main-content padding for full-bleed auth layout */
    .main-content--full {
        padding: 0 !important;
        margin: 0 !important;
        min-height: 100vh !important;
    }
    body::before { display: none !important; }

    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        position: relative;
        overflow: hidden;

        /* Warm teal-to-slate gradient */
        background: linear-gradient(145deg, #0f766e 0%, #0d9488 25%, #14b8a6 50%, #5eead4 75%, #ccfbf1 100%);
    }

    /* Soft radial overlays for depth */
    .auth-wrapper::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.18) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, rgba(15,23,42,0.12) 0%, transparent 50%);
        pointer-events: none;
    }

    /* Dot texture */
    .auth-wrapper::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.1) 1px, transparent 0);
        background-size: 28px 28px;
        pointer-events: none;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow:
            0 20px 60px rgba(0,0,0,0.15),
            0 4px 16px rgba(0,0,0,0.08);
        padding: 2.5rem 2rem;
        position: relative;
        z-index: 1;
    }

    .auth-logo {
        text-align: center;
        font-size: 1.625rem;
        font-weight: 700;
        color: #0d9488;
        margin-bottom: 1.5rem;
        letter-spacing: -0.03em;
    }

    .auth-card h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
        text-align: center;
        color: #1e293b;
    }

    .auth-card .auth-subtitle {
        color: #94a3b8;
        text-align: center;
        margin-bottom: 1.75rem;
        font-size: 0.8125rem;
    }

    .auth-card .form-group {
        margin-bottom: 1.125rem;
    }

    .auth-card label {
        display: block;
        font-weight: 600;
        font-size: 0.8125rem;
        margin-bottom: 0.375rem;
        color: #374151;
    }

    .label-optional {
        font-weight: 400;
        color: #94a3b8;
        font-size: 0.75rem;
    }

    .auth-card .form-input,
    .auth-card .form-select,
    .auth-card .form-control {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 0.875rem;
        font-family: var(--font, 'Space Grotesk', sans-serif);
        transition: all 0.2s ease;
        box-sizing: border-box;
        background: #fff;
        color: #1e293b;
    }

    .auth-card .form-input:hover,
    .auth-card .form-select:hover,
    .auth-card .form-control:hover {
        border-color: #cbd5e1;
    }

    .auth-card .form-input:focus,
    .auth-card .form-select:focus,
    .auth-card .form-control:focus {
        outline: none;
        border-color: #0d9488;
        box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
    }

    .auth-card .btn-primary {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 0.75rem;
        background: linear-gradient(135deg, #0d9488, #0f766e);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 0.9375rem;
        font-weight: 600;
        font-family: var(--font, 'Space Grotesk', sans-serif);
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 1.25rem;
        box-shadow: 0 2px 8px rgba(13,148,136,0.3);
    }

    .auth-card .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(13,148,136,0.35);
    }

    .auth-card .btn-primary:active {
        transform: translateY(0);
    }

    .auth-card .auth-links {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: #94a3b8;
    }

    .auth-card .auth-links a {
        color: #0d9488;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-card .auth-links a:hover {
        text-decoration: underline;
    }

    .auth-card .field-errors {
        list-style: none;
        padding: 0;
        margin: 0.25rem 0 0 0;
        font-size: 0.75rem;
        color: #dc2626;
    }

    .auth-card .non-field-errors {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-left: 3px solid #dc2626;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 1.25rem;
        list-style: none;
        font-size: 0.8125rem;
        color: #991b1b;
    }

    @media (max-width: 480px) {
        .auth-wrapper { padding: 1rem; }
        .auth-card {
            padding: 2rem 1.5rem;
            border-radius: 14px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">OTCloud</div>
        {% block auth_content %}{% endblock %}
    </div>
</div>
{% endblock %}
