{% extends "base.html" %}

{% block title %}Delete Client - OTCloud{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">Delete Client</h1>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <div class="confirm-delete">
      <p class="confirm-delete-message">
        Are you sure you want to delete <strong>{{ client.full_name }}</strong>?
        This action cannot be undone.
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="form-actions">
          <button type="submit" class="btn btn-danger">Delete</button>
          <a href="{% url 'clients:client_detail' pk=client.pk %}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
